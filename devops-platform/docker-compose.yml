version: "3.9"
services: 
  api:
    build: ./service/api
    environment:
      DB_HOST: postgres
      CACHE_HOST: redis
    depends_on: 
      - postgres
      - redis
  postgres:
    image: postgres:15
    environment: 
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret 
      POSTGRES_DB: platform
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
  gateway:
    image: nginx
    ports:
      - "80:80"
    volumes: 
     - ./nginx/nginx.conf:/etc/ngixn/nginx.conf
    depends_on:
      - api

   prometheus:
     image: prom/prometheus
     volumes: 
       - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
   grafana:
     image: grafana/grafana
     ports: 
       - "3001:3001"
volume:
  pgdata:

